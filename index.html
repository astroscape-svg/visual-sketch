<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Sketch Debug</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui { position: relative; z-index: 10; padding: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .controls { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; display: flex; gap: 10px; }
        button { padding: 12px 20px; font-size: 16px; border-radius: 5px; border: none; background: #007bff; color: white; }
        button:disabled { background: #555; }
        #log { width: 90%; max-height: 150px; background: rgba(0,0,0,0.8); font-family: monospace; font-size: 12px; padding: 10px; overflow-y: auto; border: 1px solid #444; color: #0f0; }
    </style>
</head>
<body>

    <div class="ui">
        <h2>Visual Sketch Debug</h2>
        <div class="controls">
            <button id="startBtn">マイクを開始</button>
            <button id="stopBtn" disabled>停止</button>
        </div>
        <div id="log">ログ: 準備完了。ボタンを押してください。</div>
    </div>

    <canvas id="visCanvas"></canvas>

    <script>
        // ログ出力用関数
        const logDiv = document.getElementById('log');
        function guiLog(msg) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        let audioContext, analyser, source, animationId, dataArray;
        const canvas = document.getElementById('visCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        // キャンバスリサイズ
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
        resize();

        // メイン処理
        startBtn.onclick = async () => {
            guiLog("ボタンが押されました");
            
            try {
                // 1. AudioContextの作成
                if (!audioContext) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContextClass) {
                        throw new Error("このブラウザはWeb Audio APIをサポートしていません");
                    }
                    audioContext = new AudioContextClass();
                    guiLog("AudioContextを作成しました");
                }

                // 2. iOSのサスペンド解除
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                    guiLog("AudioContextを再開(resume)しました");
                }

                // 3. マイクアクセス
                guiLog("マイク許可をリクエスト中...");
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("getUserMedia が未定義です（HTTPS接続ですか？）");
                }

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                guiLog("マイク許可が降りました");

                // 4. 解析器のセットアップ
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                startBtn.disabled = true;
                stopBtn.disabled = false;
                guiLog("解析を開始します！");

                draw();
            } catch (err) {
                guiLog(`エラー発生: ${err.name} - ${err.message}`);
                console.error(err);
            }
        };

        stopBtn.onclick = () => {
            if (audioContext) audioContext.close();
            audioContext = null;
            cancelAnimationFrame(animationId);
            startBtn.disabled = false;
            stopBtn.disabled = true;
            guiLog("停止しました");
        };

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(17, 17, 17, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = dataArray[i];
                ctx.fillStyle = `rgb(${barHeight + 100}, 50, 50)`;
                ctx.fillRect(x, canvas.height - barHeight * 2, barWidth, barHeight * 2);
                x += barWidth + 1;
            }
        }
    </script>
</body>
</html>
