<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Visual Sketch</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        h1 { margin-top: 20px; font-weight: 300; }
        #visCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .controls {
            background-color: rgba(34, 34, 34, 0.8);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 15px;
            align-items: center;
            position: fixed;
            bottom: 20px;
            z-index: 10;
        }
        button, select {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
        }
        button {
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        select { background-color: #444; color: white; }
        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>Intelligent Visual Sketch</h1>
    <canvas id="visCanvas"></canvas>
    <div class="controls">
        <button id="startBtn">マイクを開始</button>
        <button id="stopBtn" disabled>停止</button>
        <label for="styleSelect">スタイル:</label>
        <select id="styleSelect">
            <option value="circles">抽象円</option>
            <option value="waves">浮世絵波風</option>
        </select>
    </div>
    <div id="status">ステータス: 停止中</div>
    <script src="app.js"></script>
</body>
</html>
